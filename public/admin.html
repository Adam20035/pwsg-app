<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admina - Platforma Wydarzen Studenckich</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="style.css">
  <style>
    .role-select{padding:4px 8px;border-radius:6px;border:1px solid #cbd5e0;font-size:.82rem;}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal-box{background:#fff;border-radius:12px;padding:28px;width:100%;max-width:480px;box-shadow:0 8px 30px rgba(0,0,0,.18);}
    .modal-box h2{margin:0 0 18px;font-size:1.15rem;}
    .modal-box .form-group{margin-bottom:14px;}
    .modal-box label{display:block;font-size:.82rem;color:#4a5568;margin-bottom:4px;}
    .modal-box input,.modal-box select{width:100%;padding:8px 12px;border:1px solid #cbd5e0;border-radius:6px;font-size:.9rem;box-sizing:border-box;}
    .modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
    .badge-purple{background:#e9d8fd;color:#6b46c1;}
    .actions-wrap{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
  </style>
</head>
<body>

<div class="modal-overlay" id="modal-edit-event" onclick="if(event.target===this)closeEditEvent()">
  <div class="modal-box">
    <h2>&#9998; Edytuj wydarzenie</h2>
    <input type="hidden" id="edit-ev-id">
    <div class="form-group"><label>Nazwa</label><input type="text" id="edit-ev-nazwa"></div>
    <div class="form-group"><label>Data</label><input type="date" id="edit-ev-data"></div>
    <div class="form-group"><label>Miejsce</label><input type="text" id="edit-ev-miejsce"></div>
    <div class="form-group"><label>Limit miejsc</label><input type="number" id="edit-ev-limit" min="1"></div>
    <div class="form-group"><label>Typ</label>
      <select id="edit-ev-typ">
        <option>Wyklad</option><option>Warsztaty</option><option>Konferencja</option>
        <option>Zawody</option><option>Kulturalne</option><option>Inne</option>
      </select>
    </div>
    <div class="form-group"><label>Punkty za obecnosc</label><input type="number" id="edit-ev-punkty" min="0"></div>
    <div id="edit-ev-alert" class="alert hidden"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeEditEvent()">Anuluj</button>
      <button class="btn btn-primary" onclick="submitEditEvent()">Zapisz</button>
    </div>
  </div>
</div>

<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <img src="logo.png" alt="WAT">
    <div class="drawer-header-text"><div class="dtitle">WAT</div><div class="dsub">Panel Admina</div></div>
    <button class="drawer-close" onclick="closeDrawer()">&#10005;</button>
  </div>
  <nav class="drawer-nav">
    <a href="#" onclick="showTab('users');closeDrawer()"><span class="dicon">&#128101;</span> Uzytkownicy</a>
    <a href="#" onclick="showTab('events');closeDrawer()"><span class="dicon">&#128197;</span> Wszystkie wydarzenia</a>
    <div class="drawer-divider"></div>
    <a href="account.html"><span class="dicon">&#128100;</span> Moje konto</a>
    <a href="help.html"><span class="dicon">&#10067;</span> Pomoc</a>
    <a href="about.html"><span class="dicon">&#8505;</span> O aplikacji</a>
    <div class="drawer-divider"></div>
    <a href="#" class="danger" onclick="logout()"><span class="dicon">&#128682;</span> Wyloguj</a>
  </nav>
  <div class="drawer-user" id="drawer-user-info"></div>
</div>

<nav>
  <span class="brand"><img src="logo.png" class="nav-logo" alt="WAT"><span>Platforma Wydarzen Studenckich</span></span>
  <div class="nav-links">
    <a href="#" onclick="showTab('users')">&#128101; Uzytkownicy</a>
    <a href="#" onclick="showTab('events')">&#128197; Wydarzenia</a>
    <a href="#" onclick="logout()">Wyloguj</a>
    <button class="hamburger" onclick="openDrawer()">&#9776;</button>
  </div>
</nav>

<div class="container wide">
  <div id="tab-users" class="card">
    <h1>Panel Administratora &ndash; Uzytkownicy</h1>
    <div id="alert-users" class="alert hidden"></div>
    <div id="users-body" class="loading">Ladowanie...</div>
  </div>
  <div id="tab-events" class="card hidden" style="margin-top:20px">
    <h1>Panel Administratora &ndash; Wszystkie wydarzenia</h1>
    <div id="alert-events" class="alert hidden"></div>
    <div id="events-body" class="loading">Ladowanie...</div>
  </div>
</div>

<script>
var ROLE_BADGE = {Admin:'badge-purple', Organizator:'badge-blue', Student:'badge-gray'};
var _adminEvents = [];

function openDrawer(){document.getElementById('drawer').classList.add('open');document.getElementById('drawer-overlay').classList.add('open');document.body.style.overflow='hidden';}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('drawer-overlay').classList.remove('open');document.body.style.overflow='';}

async function init() {
  var r = await fetch('/api/me');
  if (!r.ok) { window.location='/'; return; }
  var u = (await r.json()).user;
  if (u.rola !== 'Admin') { window.location='/'; return; }
  document.getElementById('drawer-user-info').innerHTML = '<strong>'+u.imie_nazwisko+'</strong>'+u.email;
  window._myId = u.id;
  loadUsers();
}

function showTab(tab) {
  document.getElementById('tab-users').classList.toggle('hidden', tab !== 'users');
  document.getElementById('tab-events').classList.toggle('hidden', tab !== 'events');
  if (tab === 'events') loadAllEvents();
}

function showAlert(msg, type, target) {
  var el = document.getElementById(target || 'alert-users');
  el.textContent = msg;
  el.className = 'alert alert-' + type;
  setTimeout(function(){ el.className = 'alert hidden'; }, 4000);
}

/* ── USERS ── */
async function loadUsers() {
  var r = await fetch('/api/admin/users');
  var list = await r.json();
  var rows = list.map(function(u) {
    var self = (u.id === window._myId);
    var dis = self ? 'disabled' : '';
    var badge = ROLE_BADGE[u.rola] || 'badge-gray';
    var activeBadge = u.active ? 'badge-green' : 'badge-gray';
    var activeLabel = u.active ? 'Aktywny' : 'Zablokowany';
    var toggleLabel = u.active ? 'Zablokuj' : 'Odblokuj';
    var sel = '<select class="role-select" id="rs-'+u.id+'" '+dis+'>'
      + ['Student','Organizator','Admin'].map(function(ro){
          return '<option'+(u.rola===ro?' selected':'')+'>'+ro+'</option>';
        }).join('')
      + '</select>';
    return '<tr>'
      + '<td><strong>'+u.imie_nazwisko+'</strong></td>'
      + '<td>'+u.email+'</td>'
      + '<td><span class="badge '+badge+'">'+u.rola+'</span></td>'
      + '<td><span class="badge '+activeBadge+'">'+activeLabel+'</span></td>'
      + '<td>'+u.suma_punktow+'</td>'
      + '<td><div class="actions-wrap">'
        + sel
        + '<button class="btn btn-sm btn-primary" style="padding:4px 10px" '+dis+' onclick="changeRole('+u.id+')">Zmien</button>'
        + (u.email_verified===false ? '<button class="btn btn-sm" style="background:#38a169;color:#fff" onclick="verifyUser('+u.id+')">Weryfikuj email</button>' : '')
        + '<button class="btn btn-warning btn-sm" '+dis+' onclick="toggleUser('+u.id+')">'+toggleLabel+'</button>'
        + '<button class="btn btn-danger btn-sm" '+dis+' onclick="deleteUser('+u.id+')">Usun</button>'
      + '</div></td>'
      + '</tr>';
  }).join('');
  document.getElementById('users-body').innerHTML =
    '<div class="table-responsive"><table><thead><tr>'
    + '<th>Uzytkownik</th><th>Email</th><th>Rola</th><th>Status</th><th>Pkt</th><th>Akcje</th>'
    + '</tr></thead><tbody>'+rows+'</tbody></table></div>';
}

async function changeRole(id) {
  var sel = document.getElementById('rs-'+id);
  if (!sel) return;
  var r = await fetch('/api/admin/users/'+id+'/role', {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({role: sel.value})
  });
  var d = await r.json();
  if (r.ok) { showAlert('Rola zmieniona na '+sel.value+'.','success'); loadUsers(); }
  else showAlert(d.error, 'error');
}

async function verifyUser(id) {
  if (!confirm('Ręcznie zweryfikować email tego użytkownika?')) return;
  const r = await fetch('/api/admin/users/' + id + '/verify', { method: 'POST' });
  if (r.ok) { alert('Konto zweryfikowane!'); loadUsers(); }
  else alert('Błąd.');
}

async function toggleUser(id) {
  var r = await fetch('/api/admin/users/'+id+'/toggle', {method:'POST'});
  var d = await r.json();
  if (r.ok) { showAlert('Status zmieniony.','success'); loadUsers(); }
  else showAlert(d.error, 'error');
}

async function deleteUser(id) {
  if (!confirm('Usunac tego uzytkownika? Usunie to rowniez jego rejestracje i opinie.')) return;
  var r = await fetch('/api/admin/users/'+id, {method:'DELETE'});
  var d = await r.json();
  if (r.ok) { showAlert('Usunieto.','success'); loadUsers(); }
  else showAlert(d.error, 'error');
}

/* ── EVENTS ── */
async function loadAllEvents() {
  var r = await fetch('/api/admin/events');
  _adminEvents = await r.json();
  var rows = _adminEvents.map(function(e, idx) {
    return '<tr>'
      + '<td><strong>'+e.nazwa_wydarzenia+'</strong></td>'
      + '<td>'+e.data_wydarzenia+'</td>'
      + '<td>'+e.miejsce+'</td>'
      + '<td>'+e.zapisani+'/'+e.limit_miejsc+'</td>'
      + '<td>'+e.organizator_nazwa+'</td>'
      + '<td><div class="actions-wrap">'
        + '<button class="btn btn-warning btn-sm" onclick="openEditEventIdx('+idx+')">Edytuj</button>'
        + '<button class="btn btn-danger btn-sm" onclick="deleteEvent('+e.id+')">Usun</button>'
      + '</div></td>'
      + '</tr>';
  }).join('');
  document.getElementById('events-body').innerHTML =
    '<div class="table-responsive"><table><thead><tr>'
    + '<th>Nazwa</th><th>Data</th><th>Miejsce</th><th>Zapisani/Limit</th><th>Organizator</th><th>Akcje</th>'
    + '</tr></thead><tbody>'+rows+'</tbody></table></div>';
}

function openEditEventIdx(idx) {
  var e = _adminEvents[idx];
  document.getElementById('edit-ev-id').value    = e.id;
  document.getElementById('edit-ev-nazwa').value  = e.nazwa_wydarzenia;
  document.getElementById('edit-ev-data').value   = e.data_wydarzenia;
  document.getElementById('edit-ev-miejsce').value= e.miejsce;
  document.getElementById('edit-ev-limit').value  = e.limit_miejsc;
  document.getElementById('edit-ev-typ').value    = e.typ_wydarzenia || 'Inne';
  document.getElementById('edit-ev-punkty').value = e.punkty || 10;
  document.getElementById('edit-ev-alert').className = 'alert hidden';
  document.getElementById('modal-edit-event').classList.add('open');
}

function closeEditEvent() { document.getElementById('modal-edit-event').classList.remove('open'); }

async function submitEditEvent() {
  var id = document.getElementById('edit-ev-id').value;
  var body = {
    nazwa:          document.getElementById('edit-ev-nazwa').value,
    data_wydarzenia:document.getElementById('edit-ev-data').value,
    miejsce:        document.getElementById('edit-ev-miejsce').value,
    limit_miejsc:   document.getElementById('edit-ev-limit').value,
    typ_wydarzenia: document.getElementById('edit-ev-typ').value,
    punkty:         document.getElementById('edit-ev-punkty').value
  };
  var al = document.getElementById('edit-ev-alert');
  var r = await fetch('/api/admin/events/'+id, {
    method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
  });
  var d = await r.json();
  if (r.ok) { closeEditEvent(); showAlert('Zapisano.','success','alert-events'); loadAllEvents(); }
  else { al.textContent = d.error; al.className = 'alert alert-error'; }
}

async function deleteEvent(id) {
  if (!confirm('Usunac to wydarzenie? Usunie to rowniez wszystkie rejestracje i opinie.')) return;
  var r = await fetch('/api/admin/events/'+id, {method:'DELETE'});
  var d = await r.json();
  if (r.ok) { showAlert('Usunieto wydarzenie.','success','alert-events'); loadAllEvents(); }
  else showAlert(d.error, 'error', 'alert-events');
}

async function logout() { await fetch('/api/logout',{method:'POST'}); window.location='/'; }

init();
</script>
<script src="/notifications.js"></script>
</body>
</html>
