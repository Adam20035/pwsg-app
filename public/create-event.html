<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nowe wydarzenie - Platforma Wydarzen Studenckich</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <img src="logo.png" alt="WAT">
    <div class="drawer-header-text"><div class="dtitle">WAT</div><div class="dsub">Platforma Wydarzen</div></div>
    <button class="drawer-close" onclick="closeDrawer()">&#10005;</button>
  </div>
  <nav class="drawer-nav">
    <a href="organizer.html"><span class="dicon">&#128203;</span> Moje wydarzenia</a>
    <a href="create-event.html" class="active"><span class="dicon">&#10133;</span> Nowe wydarzenie</a>
    <div class="drawer-divider"></div>
    <a href="account.html"><span class="dicon">&#128100;</span> Moje konto</a>
    <a href="help.html"><span class="dicon">&#10067;</span> Pomoc</a>
    <a href="about.html"><span class="dicon">&#8505;</span> O aplikacji</a>
    <div class="drawer-divider"></div>
    <a href="#" class="danger" onclick="logout()"><span class="dicon">&#128682;</span> Wyloguj</a>
  </nav>
  <div class="drawer-user" id="drawer-user-info"></div>
</div>
<nav>
  <span class="brand"><img src="logo.png" class="nav-logo" alt="WAT"><span>Platforma Wydarzen Studenckich</span></span>
  <div class="nav-links">
    <a href="organizer.html">Moje wydarzenia</a>
    <a href="#" onclick="logout()">Wyloguj</a>
    <button class="hamburger" onclick="openDrawer()">&#9776;</button>
  </div>
</nav>
<div class="container">
  <div class="card">
    <h1>Kreator nowego wydarzenia</h1>
    <div id="alert-success" class="alert alert-success hidden">Wydarzenie zostalo utworzone! <a href="organizer.html">Zobacz liste</a></div>
    <div id="alert-error" class="alert alert-error hidden"></div>
    <div class="form-group"><label>Nazwa wydarzenia</label><input type="text" id="nazwa" placeholder="Wpisz nazwe..."></div>
    <div class="form-group"><label>Typ wydarzenia</label><select id="typ"><option value="Laboratoria">Laboratoria</option><option value="Warsztaty" selected>Warsztaty</option><option value="Wyklad">Wyklad</option><option value="Konferencja">Konferencja</option><option value="Inne">Inne</option></select></div>
    <div class="form-group"><label>Data wydarzenia</label><input type="date" id="data"></div>
    <div class="form-group"><label>Miejsce</label><input type="text" id="miejsce" placeholder="Sala/budynek..."></div>
    <div class="form-group"><label>Maksymalna liczba uczestnikow</label><input type="number" id="limit" value="50" min="1"></div>
    <div class="form-group"><label>Punkty za uczestnictwo</label><input type="number" id="punkty" value="10" min="1" max="100"><small style="color:#718096;display:block;margin-top:4px">Ile punktow dostanie student po potwierdzeniu obecnosci</small></div>
    <div class="btn-group">
      <button class="btn btn-secondary" onclick="window.location='organizer.html'">Anuluj</button>
      <button class="btn btn-primary" onclick="submitEvent()">Utworz wydarzenie</button>
    </div>
  </div>
</div>
<script>
function openDrawer(){document.getElementById('drawer').classList.add('open');document.getElementById('drawer-overlay').classList.add('open');document.body.style.overflow='hidden';}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('drawer-overlay').classList.remove('open');document.body.style.overflow='';}
async function init(){
  var r=await fetch('/api/me');if(!r.ok){window.location='/';return;}
  var u=(await r.json()).user;if(u.rola==='Student'){window.location='/events.html';return;}
  document.getElementById('drawer-user-info').innerHTML='<strong>'+u.imie_nazwisko+'</strong>'+u.email;
}
async function submitEvent(){
  var nazwa=document.getElementById('nazwa').value.trim();var typ=document.getElementById('typ').value;
  var data=document.getElementById('data').value;var miejsce=document.getElementById('miejsce').value.trim();
  var limit=document.getElementById('limit').value;var punkty=document.getElementById('punkty').value;
  var errEl=document.getElementById('alert-error');errEl.classList.add('hidden');
  if(!nazwa){errEl.textContent='Podaj nazwe.';errEl.classList.remove('hidden');return;}
  if(!data){errEl.textContent='Wybierz date.';errEl.classList.remove('hidden');return;}
  if(!miejsce){errEl.textContent='Podaj miejsce.';errEl.classList.remove('hidden');return;}
  var r=await fetch('/api/events',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nazwa:nazwa,typ_wydarzenia:typ,data_wydarzenia:data,miejsce:miejsce,limit_miejsc:limit,punkty:punkty})});
  var d=await r.json();
  if(r.ok){document.getElementById('alert-success').classList.remove('hidden');document.getElementById('nazwa').value='';document.getElementById('data').value='';document.getElementById('miejsce').value='';document.getElementById('punkty').value='10';}
  else{errEl.textContent=d.error;errEl.classList.remove('hidden');}
}
async function logout(){await fetch('/api/logout',{method:'POST'});window.location='/';}
init();
</script>
</body>
</html>
